id: citrix-netscaler-detect

info:
  name: Citrix NetScaler ADC/Gateway - Detection
  author: custom
  severity: info
  description: |
    Detects Citrix NetScaler ADC/Gateway appliances through multiple vectors
    including endpoint probing, cookie analysis, header inspection, page titles,
    and favicon fingerprinting.
  reference:
    - https://github.com/fox-it/citrix-netscaler-triage
    - https://github.com/securekomodo/citrixInspector
    - https://github.com/rapid7/recog
  classification:
    cpe: cpe:2.3:a:citrix:netscaler_gateway:*:*:*:*:*:*:*:*
  metadata:
    max-request: 6
    vendor: citrix
    product: netscaler_gateway
    shodan-query: 'http.title:"Citrix Gateway" || http.title:"NetScaler"'
    fofa-query: title="Citrix Gateway" || title="NetScaler"
  tags: panel,citrix,netscaler,detect,tech

http:
  - method: GET
    path:
      - "{{BaseURL}}/vpn/index.html"
      - "{{BaseURL}}/logon/LogonPoint/index.html"
      - "{{BaseURL}}/epa/epa.html"
      - "{{BaseURL}}/vpn/images/AccessGateway.ico"

    stop-at-first-match: true
    host-redirects: true
    max-redirects: 2

    matchers-condition: or
    matchers:
      - type: word
        name: citrix-gateway-title
        words:
          - "<title>Citrix Gateway</title>"
          - '<title class="_ctxstxt_CitrixGateway">Citrix Gateway</title>'

      - type: word
        name: netscaler-gateway-title
        words:
          - "NetScaler Gateway"
          - "NetScaler AAA"
        part: body

      - type: word
        name: netscaler-aaa-title
        words:
          - '<title class="_ctxstxt_NetscalerAAA">NetScaler AAA</title>'

      - type: dsl
        name: nsc-cookie
        dsl:
          - 'contains(header, "NSC_")'

      - type: dsl
        name: citrix-csp
        dsl:
          - 'contains(header, "com.citrix.agmacepa")'

      - type: word
        name: citrix-js-namespace
        words:
          - "CTXS."
        part: body

      - type: dsl
        name: accessgateway-favicon
        dsl:
          - 'status_code == 200 && len(body) == 1150'

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '<title[^>]*>([^<]*(?:Citrix|NetScaler|Gateway)[^<]*)</title>'
