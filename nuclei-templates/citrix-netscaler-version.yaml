          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          conn = http.client.HTTPSConnection(host, port, context=ctx, timeout=15)
          conn.request("GET", "/vpn/js/rdx/core/lang/rdx_en.json.gz",
                       headers={"User-Agent": "Mozilla/5.0", "Accept-Encoding": "identity"})
          resp = conn.getresponse()

          if resp.status != 200:
              print(f"NO_MATCH: rdx_en.json.gz returned HTTP {resp.status}")
              exit()

          data = resp.read()
          conn.close()

          # Check if server applied Content-Encoding gzip (double-compressed)
          if not data.startswith(b"\x1f\x8b\x08\x08"):
              # Try raw read without decompression
              conn2 = http.client.HTTPSConnection(host, port, context=ctx, timeout=15)
              conn2.request("GET", "/vpn/js/rdx/core/lang/rdx_en.json.gz",
                            headers={"User-Agent": "Mozilla/5.0",
                                     "Accept-Encoding": "identity"})
              resp2 = conn2.getresponse()
              # Read raw from socket
              raw = resp2.fp.read()
              conn2.close()
              if raw.startswith(b"\x1f\x8b\x08\x08"):
                  data = raw

          if len(data) < 16 or not data.startswith(b"\x1f\x8b\x08\x08"):
              print(f"NO_MATCH: not a valid GZIP file ({len(data)} bytes)")
              exit()

          if b"rdx_en.json" not in data[:100]:
              print(f"NO_MATCH: GZIP filename mismatch")
              exit()

          stamp = struct.unpack("<I", data[4:8])[0]
          version = VSTAMP_DB.get(stamp, None)

          if version and version != "unknown":
              print(f"VERSION_MATCH: {version} (timestamp={stamp})")
          elif version == "unknown":
              print(f"TIMESTAMP_KNOWN_UNMAPPED: stamp={stamp}")
          else:
              from datetime import datetime, timezone
              dt = datetime.fromtimestamp(stamp, tz=timezone.utc)
              print(f"TIMESTAMP_UNKNOWN: stamp={stamp} date={dt.isoformat()}")

      except Exception as e:
          print(f"ERROR: {e}")

    args:
      TARGET: "{{BaseURL}}"

    matchers:
      - type: word
        words:
          - "VERSION_MATCH:"

    extractors:
      - type: regex
        group: 1
        regex:
          - 'VERSION_MATCH: ([0-9]+\.[0-9]+-[0-9]+\.[0-9]+)'
