id: citrix-netscaler-version

info:
  name: Citrix NetScaler ADC/Gateway - Version Detection
  author: custom
  severity: info
  description: |
    Fingerprints the exact Citrix NetScaler ADC/Gateway firmware version using
    multiple techniques:
    1. GZIP timestamp extraction from rdx_en.json.gz (fox-it technique)
    2. EPA plugin version from pluginlist.xml
    3. Favicon MD5 product identification
    4. Static file content hashing for cross-validation
  reference:
    - https://github.com/fox-it/citrix-netscaler-triage
    - https://blog.fox-it.com/2022/12/28/cve-2022-27510-cve-2022-27518-measuring-citrix-adc-gateway-version-adoption-on-the-internet/
    - https://kolbi.cz/blog/2015/05/26/fingerprinting-netscaler-gateway-version/
  classification:
    cpe: cpe:2.3:a:citrix:netscaler_gateway:*:*:*:*:*:*:*:*
  metadata:
    max-request: 4
    vendor: citrix
    product: netscaler_gateway
  tags: citrix,netscaler,version,fingerprint,tech

flow: http(1) && code(1)

http:
  - method: GET
    path:
      - "{{BaseURL}}/vpn/index.html"

    matchers:
      - type: dsl
        internal: true
        dsl:
          - 'status_code == 200'
          - 'contains(body, "NetScaler") || contains(body, "Citrix") || contains(body, "CTXS.")'
        condition: and

  - method: GET
    path:
      - "{{BaseURL}}/vpn/pluginlist.xml"

    matchers:
      - type: word
        words:
          - "pluginlist"
        part: body

    extractors:
      - type: regex
        name: epa-version
        part: body
        group: 1
        regex:
          - 'name="Netscaler Gateway EPA plug-in[^"]*"[^>]*version="([^"]+)"'

      - type: regex
        name: plugin-versions
        part: body
        group: 1
        regex:
          - 'version="([0-9]+\.[0-9]+[^"]*)"'

  - method: GET
    path:
      - "{{BaseURL}}/vpn/images/AccessGateway.ico"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'

    extractors:
      - type: dsl
        dsl:
          - 'md5(body)'

  - method: GET
    path:
      - "{{BaseURL}}/vpn/js/gateway_login_view.js"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'

    extractors:
      - type: dsl
        name: js-hash
        dsl:
          - '"gateway_login_view.js: md5=" + md5(body) + " size=" + to_string(len(body))'

